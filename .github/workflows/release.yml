name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-desktop:
    name: Release ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-latest
            script: release:linux
          - platform: windows
            runner: windows-latest
            script: release:win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" != v* ]]; then
            echo "Release tags must start with v."
            exit 1
          fi

      - name: Prepare Linux bundled binaries
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p resources/bin/linux-x64

          curl -L --fail --retry 3 -o resources/bin/linux-x64/yt-dlp \
            https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux

          curl -L --fail --retry 3 -o /tmp/ffmpeg-linux.tar.xz \
            https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz

          tar -xf /tmp/ffmpeg-linux.tar.xz -C /tmp
          cp /tmp/ffmpeg-*-amd64-static/ffmpeg resources/bin/linux-x64/ffmpeg
          chmod 755 resources/bin/linux-x64/yt-dlp resources/bin/linux-x64/ffmpeg

      - name: Prepare Windows bundled binaries
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          New-Item -ItemType Directory -Force -Path resources/bin/win32-x64 | Out-Null

          curl.exe -L --fail --retry 3 -o resources/bin/win32-x64/yt-dlp.exe `
            https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe

          curl.exe -L --fail --retry 3 -o "$env:TEMP/ffmpeg-windows.zip" `
            https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip

          Expand-Archive -Path "$env:TEMP/ffmpeg-windows.zip" -DestinationPath "$env:TEMP/ffmpeg-windows" -Force
          $ffmpeg = Get-ChildItem "$env:TEMP/ffmpeg-windows" -Recurse -Filter ffmpeg.exe | Select-Object -First 1

          if (-not $ffmpeg) {
            throw "ffmpeg.exe was not found in downloaded archive"
          }

          Copy-Item $ffmpeg.FullName resources/bin/win32-x64/ffmpeg.exe

      - name: Validate bundled binaries
        run: bun run validate:bundled-binaries

      - name: Build and publish
        run: bun run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
